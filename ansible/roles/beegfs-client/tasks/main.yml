- name: Safely (lazy) unmount BeeGFS
  ansible.builtin.command: umount -l /beegfs
  become: true
  become_user: root
  # Ignore errors in case it is already unmounted
  ignore_errors: true

- name: Stop client service if it is running.
  ansible.builtin.systemd_service:
    name: beegfs-client
    state: stopped
    enabled: false
  become: true
  become_user: root
  ignore_errors: true
- name: Create mount location
  ansible.builtin.file:
    path: /beegfs
    state: directory
  become: true
  become_user: root
- name: Configure client
  ansible.builtin.command:
    cmd: /opt/beegfs/sbin/beegfs-setup-client -m hostnode
  become: true
  become_user: root
- name: Mounts file
  ansible.builtin.copy:
    src: files/beegfs-mounts.conf
    dest: /etc/beegfs/beegfs-mounts.conf
    owner: root
    group: root
  become: true
  become_user: root
- name: Enable SELinux support in BeeGFS Client
  ansible.builtin.lineinfile:
    path: /etc/beegfs/beegfs-client.conf
    regexp: '^sysSelinuxEnabled\s*='
    line: 'sysSelinuxEnabled = true'
  become: true
  become_user: root
- name: Install kernel development dependencies for BeeGFS autobuild
  ansible.builtin.dnf:
    name: 
      - gcc
      - make
      - elfutils-libelf-devel
      - "kernel-devel-{{ ansible_kernel }}"
    state: present
  become: true
- name: start client
  ansible.builtin.systemd_service:
    name: beegfs-client
    state: started
    enabled: true
  become: true
  become_user: root
- name: Make user directory
  ansible.builtin.file:
    path: /beegfs/almalinux
    state: directory
    owner: almalinux
  become: true
  become_user: root
- name: Create home directory sym-link
  ansible.builtin.file:
    src: /beegfs/almalinux
    dest: "/home/almalinux/beegfs🐝"
    state: link
