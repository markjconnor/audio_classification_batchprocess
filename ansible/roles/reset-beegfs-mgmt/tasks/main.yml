- name: Configure management
  ansible.builtin.command:
    cmd: /opt/beegfs/sbin/beegfs-mgmtd --init
  args:
    # Ansible will skip the command if this file already exists
    creates: /var/lib/beegfs/mgmtd.sqlite
  become: true
- name: start mgmtd
  ansible.builtin.systemd_service:
    name: beegfs-mgmtd
    state: started
    enabled: true
  become: true
  become_user: root
