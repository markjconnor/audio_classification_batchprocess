- name: Stop metadata service if it is running.
  ansible.builtin.systemd_service:
    name: beegfs-meta
    state: stopped
    enabled: false
  become: true
  become_user: root
  ignore_errors: true
- name: Clean metadata location
  ansible.builtin.file:
    path: /beegfs_data/md
    state: absent
  become: true
  become_user: root
- name: Create metadata location
  ansible.builtin.file:
    path: /beegfs_data/md
    state: directory
  become: true
  become_user: root
- name: Configure metadata
  ansible.builtin.command:
    cmd: /opt/beegfs/sbin/beegfs-setup-meta -p /beegfs_data/md -m hostnode
  become: true
  become_user: root
- name: Configure service to use auth secret
  ansible.builtin.lineinfile:
    path: /etc/beegfs/beegfs-meta.conf
    regexp: '^connAuthFile\s*='
    line: 'connAuthFile = /etc/beegfs/conn.auth'
  become: true
  become_user: root
- name: start metadata
  ansible.builtin.systemd_service:
    name: beegfs-meta
    state: started
    enabled: true
  become: true
  become_user: root
