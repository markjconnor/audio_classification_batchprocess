---
## 1. Global Package Installation
- hosts: all
  roles:
  - common
  - openmpi
  - nfs-packages
  - slurm-packages
  - beegfs-packages  # Integrated from beegfs.yaml
  - hostfile

- hosts: workers
  roles:
  - workername

- hosts: hostnode
  roles:
  - hostname

# 3. Security & SSH Keys (Consolidated)
- hosts: hostnode
  roles: 
  - commonkeys-server
  - commonkeys-server-beegfs
- hosts: hostnode:workers
  roles:
  - commonkeys-clients
  - commonkeys-clients-beegfs

# 4. Shared Storage - NFS (Administrative/Home Directories)
- hosts: hostnode
  roles:
  - nfs-server
- hosts: workers
  roles: 
  - nfs-clients

# 5. Parallel Storage - BeeGFS (High-Performance Data)
- hosts: hostnode
  roles: 
  - beegfs-mgmt
  - beegfs-md
- hosts: workers
  roles:
  - beegfs-target
# Note: Host is added to clients so you can view/submit data from the head node
- hosts: hostnode:workers
  roles:
  - beegfs-client 

# 6. Job Orchestration - Slurm
- hosts: all
  roles:
  - slurm-config
- hosts: hostnode
  roles: 
  - slurm-controller
- hosts: workers
  roles:
  - slurm-worker

- hosts: hostnode
  run_once: true
  roles:
  - dataset
  - bash-scripts
  - prometheus
  - dashboard

- hosts: workers
  roles:
  - prepare-worker-env
  - node-exporter


